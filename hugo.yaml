# Configuration
baseURL: "http://localhost:1313"
title: "Snap CD Documentation"
theme: "snapcd"

enableRobotsTXT: true
enableGitInfo: true
# enableEmoji: false
hasCJKLanguage: false

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
    title: "Snap CD Documentation"

module:
  hugoVersion:
    extended: true
    min: "0.112.0"

  workspace: hugo.work
  imports:
    - path: .

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    - identifier: get
      name: Get
      url: "https://snapcd.io"
      weight: 2
    - identifier: samples
      name: Samples
      pageRef: "https://github.com/schrieksoft/snapcd/snapcd-samples"
      weight: 3
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/schrieksoft/snapcd"
      params:
        icon: github

  # sidebar:
  #   - identifier: more
  #     name: More
  #     params:
  #       type: separator
  #     weight: 1
  #   - identifier: about
  #     name: "About"
  #     pageRef: "/about"
  #     weight: 2
  #   - identifier: hugoDocs
  #     name: "Hugo Docs ↗"
  #     url: "https://gohugo.io/documentation/"
  #     weight: 3

params:
  description: Snap CD technical documentation.

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/favicon.ico
      dark: images/favicon-dark.ico
      # width: 40
      # height: 20
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: full

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  comments:
    enable: false
    type: giscus

