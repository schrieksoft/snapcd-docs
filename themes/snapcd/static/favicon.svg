<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="960"
   height="960"
   viewBox="0 0 100 100"
   shape-rendering="crispEdges"
   version="1.1"
   id="svg37"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <!-- Define gradients for shading - inverted to white -->
  <defs
     id="defs17">
    <linearGradient
       id="topGradient"
       x1="35.355339"
       y1="56.568542"
       x2="106.06602"
       y2="127.27922"
       gradientTransform="matrix(1.4142136,0,0,0.70710678,-50,-40)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop2" />
      <stop
         offset="100%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop4" />
    </linearGradient>
    <linearGradient
       id="leftGradient"
       x1="61.237244"
       y1="53.072278"
       x2="122.47449"
       y2="53.072278"
       gradientTransform="matrix(0.81649658,0,0,1.2247449,-50,-40)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop7" />
      <stop
         offset="100%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop9" />
    </linearGradient>
    <linearGradient
       id="rightGradient"
       x1="122.47449"
       y1="53.072278"
       x2="183.71173"
       y2="53.072278"
       gradientTransform="matrix(0.81649658,0,0,1.2247449,-50,-40)"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop12" />
      <stop
         offset="100%"
         style="stop-color:#ffffff;stop-opacity:1"
         id="stop14" />
    </linearGradient>
  </defs>
  <!-- Top face -->
  <path
     d="M 50,0 100,25 50,50 0,25 Z"
     fill="url(#topGradient)"
     stroke="none"
     id="path19"
     style="fill:url(#topGradient)" />
  <!-- Left face -->
  <path
     d="m 0,25 50,25 v 50 L 0,75 Z"
     fill="url(#leftGradient)"
     stroke="none"
     id="path21"
     style="fill:url(#leftGradient)" />
  <!-- S letter on left face - black lines (inverted) -->
  <!-- Top line -->
  <path
     d="M 0,25 50,50 V 60 L 0,35 Z"
     fill="#000000"
     id="path23" />
  <!-- Middle line -->
  <path
     d="M 0,45 50,70 V 80 L 0,55 Z"
     fill="#000000"
     id="path25" />
  <!-- Bottom line -->
  <path
     d="m 0,65 50,25 v 10 L 0,75 Z"
     fill="#000000"
     id="path27" />
  <!-- Left vertical connector -->
  <path
     d="m 0,35 10,5 V 50 L 0,55 Z"
     fill="#000000"
     id="path29" />
  <!-- Right vertical connector -->
  <path
     d="m 40,75 10,5 v 10 l -10,5 z"
     fill="#000000"
     id="path31" />
  <!-- Right face -->
  <path
     d="M 50,50 100,25 V 75 L 50,100 Z"
     fill="url(#rightGradient)"
     stroke="none"
     id="path33"
     style="fill:url(#rightGradient)" />
  <!-- Top line on right face -->
  <path
     d="M 50,50 100,25 V 35 L 50,60 Z"
     fill="#000000"
     id="path35" />
</svg>